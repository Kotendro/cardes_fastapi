

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <button id="addCardBtn">Add card</button>
    </header>

    <section id="cardSection">
        <div id="cardContainer" class="container-fluid w-75">
            <div class="row g-3" id="cardRow"></div>
        </div>

        <template id="cardTemplate">
            <div class="col-6 col-md-4 col-lg-3">
                <div class="w-100 ratio ratio-3x4 border rounded overflow-hidden bg-body-tertiary">
                    <img
                        class="w-100 h-100 object-fit-cover"
                        alt=""
                    >
                </div>
                <div class="text-center mt-1">
                    <span></span>
                </div>
            </div>
        </template>
    </section>

    <dialog id="cardFormDialog" class="rounded">
        <div class="container-fluid">
            <div class="row">
                <div class="col">
                <form id="cardForm" novalidate>
                    <!-- Title -->
                    <div class="mb-2">
                        <input id="titleFormInput" class="form-control" name="title" type="text" placeholder="*Title" required>
                        <div id="titleFormError" class="invalid-feedback d-block d-none" aria-live="polite"></div>
                    </div>

                    <!-- description -->
                    <div class="mb-2">
                        <textarea id="descriptionFormInput" class="form-control overflow-auto" rows="5" placeholder="Description" style="resize: none;" name="description"></textarea>
                    </div>

                    <!-- difficulty -->
                    <div class="mb-2 input-group">
                        <span class="input-group-text" id="basic-addon1">Difficulty</span>
                        <select id="difficultyFormInput" class="form-select" name="difficulty">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>

                    <!-- completed -->
                    <div class="form-check mb-2">
                        <label for="completedFormInput" class="form-check-label">Completed</label>
                        <input id="completedFormInput" class="form-check-input" name="completed" type="checkbox">
                    </div>

                    <!-- tags -->
                    <fieldset id="tagsFormField">
                        <legend>Tags</legend>

                        <div id="tagsWrapper" class="d-flex flex-wrap align-items-center" style="max-height:104px; overflow-y:auto;">

                            <div id="chipsContainerForm"></div>

                            <input 
                                type="text"
                                id="tagFormEditor"
                                class="border-0 shadow-none bg-transparent p-0 mb-1 me-1"
                                placeholder="Add tag..."
                                style="width:120px;"
                            >

                        </div>

                        <template id="chipTemplateForm">
                            <div class="badge bg-secondary d-inline-flex align-items-center mb-1 me-1">
                                <span></span>
                                <input type="hidden" name="tag_names">
                                <button type="button" class="btn-close btn-close-white btn-sm"></button>
                            </div>
                        </template>
                    </fieldset>


                    <!-- image -->
                    <div>
                        <input id="imageFormInput" name="image" type="file" accept="image/jpeg, image/png" hidden>
                    </div>
                </form>
                </div>

                <!-- image preview -->
                <div class="col">
                <label
                    for="imageFormInput"
                    class="d-block w-100 ratio ratio-3x4 border rounded overflow-hidden bg-body-tertiary"
                >
                    <img
                    id="imageFormPreview"
                    class="w-100 h-100 object-fit-cover d-none"
                    alt=""
                    >

                    <div
                    id="imageFormPlaceholder"
                    class="d-flex flex-column justify-content-center align-items-center text-body-secondary"
                    >
                    <div class="fs-5">Upload</div>
                    <div class="fs-6">PNG/JPG 3:4</div>
                    </div>
                </label>

                <div id="imageFormError" class="invalid-feedback d-block"></div>
                </div>

            </div>

            <div class="mt-2 d-flex justify-content-between" id="formDialogBtns">
                <div id="leftFormDialogBtns">
                    <button type="button" id="backBtnForm" class="btn btn-secondary d-none">
                        Back
                    </button>
                </div>

                <div id="rightFormDialogBtns">
                    <button type="submit" id="submitBtnForm" form="cardForm" class="btn btn-primary">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </dialog>


    <dialog id="cardDetailDialog" class="rounded">
        <div class="container-fluid">
            <div class="row">
                <div class="col">
                    <!-- title / difficulty -->
                    <div>
                        <h4 class="text-center">
                            <span id="titleDetail"></span>
                            <span id="difficultyDetail" class="fs-6"></span>
                        </h4>
                    </div>

                    <!-- tags -->
                    <div>
                        <div id="chipsContainerDetail" class="d-flex flex-wrap justify-content-center">

                        </div>

                        <template id="chipTemplateDetail">
                            <div class="badge bg-secondary d-inline-flex align-items-center mb-1 me-1">
                                <span></span>
                            </div>
                        </template>
                    </div>

                    <div>
                        <p id="descriptionDetail"></p>
                    </div>

                </div>

                <div class="col">
                    <div class="d-block w-100 ratio ratio-3x4 border rounded overflow-hidden bg-body-tertiary">
                        <img
                        id="imageDetail"
                        class="w-100 h-100 object-fit-cover"
                        alt=""
                        >
                    </div>
                </div>
            </div>

            <div class="mt-2 d-flex justify-content-between" id="DetailDialogBtns">
                <div id="leftDetailDialogBtns">

                </div>

                <div id="rightDetailDialogBtns">
                    <button type="button" id="completeBtnDetail" class="btn btn-primary">
                        Toggle
                    </button>
                    <button type="button" id="editBtnDetail" class="btn btn-primary">
                        Edit
                    </button>
                </div>
            </div>
        </div>
    </dialog>

</body>

<script type="module" src="./js/app.js"></script>

<style>
dialog {
  width: 700px;
}

.ratio-3x4 {
  --bs-aspect-ratio: 133.333%;
}

.img-grayscale {
  filter: grayscale(100%);
}

#tagFormEditor:focus {
    outline: none;
    box-shadow: none;
}

#chipsContainer { display: contents; }

</style>

</html>
