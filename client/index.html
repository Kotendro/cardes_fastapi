<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <header>
        <button id="addCardBtn">Add card</button>
        <button id="editCardBtn">Edit card</button>
    </header>

    <section id="cardSection">

    </section>

    <dialog id="cardFormDialog">
        <form id="cardForm" novalidate>
            <div>
                <label for="titleFormInput">* Title</label>
                <input id="titleFormInput" name="title" type="text" required>
                <div id="titleFormError" aria-live="polite"></div>
            </div>

            <div>
                <label for="descriptionFormInput">Description</label>
                <textarea id="descriptionFormInput" name="description"></textarea>
            </div>

            <div>
                <label for="difficultyFormInput">Difficulty</label>
                <select id="difficultyFormInput" name="difficulty">
                    <option value="easy">easy</option>
                    <option value="medium">medium</option>
                    <option value="hard">hard</option>
                </select>
            </div>

            <div>
                <label for="completedFormInput">Completed</label>
                <input id="completedFormInput" name="completed" type="checkbox">
            </div>

            <fieldset id="tagsFormField">
                <legend>Tags</legend>

                <div id="chipsContainer"></div>

                <input type="text" id="tagFormEditor" hidden>
                <div id="tagFormEditorError" aria-live="polite"></div>
                <button type="button" id="addFormTag">+</button>
            </fieldset>

            <div>
                <button type="submit">submit</button>
            </div>

            <div>
                <input id="imageFormInput" name="image" type="file" accept="image/jpeg, image/png" hidden>
            </div>
        </form>

        <!-- image preview -->
        <aside>
            <label for="imageFormInput">
                <div>
                    <img id="imageFormPreview" alt="preview">
                </div>
            </label>

            <div id="imageFormError" aria-live="polite"></div>
        </aside>
    </dialog>

</body>

<script type="module" src="./js/app.js"></script>

</html>
